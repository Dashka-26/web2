<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="lab7.js"></script>
  </head>
  <body>
    <div class="p-8">
      <h1>Завдання 3</h1>
      <h2 class="text-xl mb-4">Пошук коду округу США</h2>
      <input type="text" id="countyInput" placeholder="Введіть назву округу" class="border p-2 rounded w-80">
      <button id="searchBtn" class="bg-blue-500 text-white p-2 rounded ml-2">Знайти код</button>
      <div id="result" class="mt-4 font-bold text-gray-700"></div>
    </div>

    <div class="p-8 mt-4 bg-white border border-gray-200 rounded-lg shadow-sm max-w-md">
      <h2 class="text-xl mb-4 font-bold">Завдання 4</h2>
      <form id="userForm" class="flex flex-col gap-4">

        <div>
          <label class="block text-gray-700 text-sm font-bold mb-2">Ім'я</label>
          <input type="text" id="first_name" class="border p-2 rounded w-full">
        </div>

        <div>
          <label class="block text-gray-700 text-sm font-bold mb-2">Прізвище</label>
          <input type="text" id="last_name" class="border p-2 rounded w-full">
        </div>

        <div>
          <label class="block text-gray-700 text-sm font-bold mb-2">Email:</label>
          <input type="email" id="email" class="border p-2 rounded w-full">
        </div>

        <button type="submit" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded">
          Відправити
        </button>
      </form>
    </div>
    <div class="p-8 mt-4 bg-white border border-gray-200 rounded-lg shadow-sm max-w-md">
      <h2 class="text-xl mb-4 font-bold">Завдання 5</h2>

      <div class="flex gap-4 mb-8">
        <button id="btnLeft" class="bg-gray-800 text-white px-4 py-2 rounded hover:bg-gray-700">
          Вліво
        </button>
        <button id="btnRight" class="bg-gray-800 text-white px-4 py-2 rounded hover:bg-gray-700">
          Вправо
        </button>
      </div>

      <div class="bg-gray-100 p-4 rounded-lg overflow-hidden border border-gray-200">
        <div id="elid" class="w-24 h-24 bg-purple-500 rounded-lg shadow-md transition-transform duration-300 ease-in-out"></div>
      </div>
    </div>
  </body>
</html>
